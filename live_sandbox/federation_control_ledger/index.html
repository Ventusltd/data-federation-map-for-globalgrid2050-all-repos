<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GlobalGrid2050 Federation Control Ledger</title>
<link rel="stylesheet" href="style.css">
<script src="data.js" defer></script>
<script src="app.js" defer></script>
</head>
<body>
<main class="app-shell">
<header class="topbar">
  <div>
    <p class="eyebrow">GLOBALGRID2050 · FEDERATION CONTROL LEDGER</p>
    <h1>Repository Map</h1>
    <p class="sub">Observe-only sandbox. Status is data-derived. No command triggers.</p>
  </div>
  <div class="actions">
    <button id="refitButton" type="button">Refit</button>
    <button id="fullscreenButton" type="button">Fullscreen</button>
  </div>
</header>
<section class="statusbar" aria-live="polite">
  <div><span class="label">Nodes</span><strong id="nodeCount">—</strong></div>
  <div><span class="label">Edges</span><strong id="edgeCount">—</strong></div>
  <div><span class="label">Key proof</span><strong id="keyProof">—</strong></div>
</section>
<nav id="layerNav" class="layer-nav" aria-label="Layer navigation"></nav>
<section class="controls" aria-label="Filters">
  <input id="searchInput" type="search" placeholder="Search repository, source, status">
  <select id="ragFilter" aria-label="Status filter">
    <option value="all">All status</option>
    <option value="green">Green</option>
    <option value="amber">Amber</option>
    <option value="red">Red</option>
    <option value="grey">Grey</option>
    <option value="blue">Blue</option>
  </select>
  <select id="typeFilter" aria-label="Type filter">
    <option value="all">All types</option>
    <option value="data">Data</option>
    <option value="ui">UI</option>
    <option value="homepage">Homepage</option>
    <option value="source_archive">Source archive</option>
    <option value="unknown">Unknown</option>
    <option value="external">External</option>
  </select>
</section>
<section class="finding" id="findingBox"></section>
<section class="map-wrap" aria-label="Federation dependency map">
  <div id="map" class="map"></div>
</section>
<footer class="footer">Relational node-edge data. Layered 2D rendering. Parquet remains the proof store; this sandbox is only a view.</footer>
</main>
<aside id="detailPanel" class="detail-panel" hidden></aside>
</body>
</html>
