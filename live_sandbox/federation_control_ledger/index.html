<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ventus Global Grid 2050 | Repository Relationship Board</title>
  <link rel="stylesheet" href="style.css?v=relation-board-4" />
  <script>window.REPO_BOARD_ROOT = 'data/manifest.json';</script>
  <script src="app.js?v=relation-board-4" defer></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Ventus Global Grid 2050</p>
        <h1>Repository Relationship Board</h1>
      </div>
      <div class="actions">
        <button id="resetButton" type="button">Reset</button>
        <button id="fullscreenButton" type="button">Fullscreen</button>
      </div>
    </header>

    <nav class="relation-nav" aria-label="Relationship filters">
      <button data-filter="all" type="button">All relations</button>
      <button data-filter="workflow" type="button">API / workflows</button>
      <button data-filter="data" type="button">Data</button>
      <button data-filter="governance" type="button">Governance</button>
      <button data-filter="archive" type="button">Archive</button>
      <button data-filter="external" type="button">External</button>
      <button data-filter="repo" type="button">Repo refs</button>
    </nav>

    <nav id="layerNav" class="layer-nav" aria-label="Repository layer key and switches"></nav>

    <section class="summary" aria-live="polite">
      <div><span class="label">Scope</span><strong id="scopeName">Loading</strong></div>
      <div><span class="label">Repos / relations</span><strong id="relationCount">—</strong></div>
    </section>

    <section class="board-wrap" aria-label="Repository relationship board">
      <div id="board" class="board"></div>
    </section>

    <footer class="note">Relational database design view. One card per repository or source. Lines show declared relationships. Observe-only.</footer>
  </main>
</body>
</html>
