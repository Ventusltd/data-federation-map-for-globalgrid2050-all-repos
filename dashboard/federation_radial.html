<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Ventus Global Grid 2050 · The Spider Sandbox</title><link rel="stylesheet" href="federation_radial.css"><style>:root{--bg:#0b0d12;--panel:#12151c;--line:#262b36;--text:#eef2fb;--muted:#9aa3b5;--cyan:#00e5ff;--safe:clamp(12px,2.3vw,28px);--shell:1040px}*{box-sizing:border-box}body{margin:0;height:100dvh;overflow:hidden;display:flex;flex-direction:column;background:radial-gradient(1200px 700px at 50% -10%,rgba(0,229,255,.06),transparent 60%),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif}button,select{font:inherit}.top{border-bottom:1px solid var(--line);background:rgba(11,13,18,.92)}.bar,.controls,.crumbs,.hint{width:min(var(--shell),calc(100vw - var(--safe)*2));margin:0 auto}.bar{display:flex;align-items:center;gap:10px 14px;flex-wrap:wrap;padding:max(env(safe-area-inset-top),12px) 0 10px}.brand{display:flex;flex-direction:column;line-height:1.05;min-width:190px}.ey,.grouplabel,.count,.crumbs,.hint,.sect,.badge,.reltag,.go,.srctag,label{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.ey{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan)}h1{margin:2px 0 0;font-size:1rem}.pick{display:flex;align-items:center;gap:8px;flex:1 1 280px;min-width:0}label,.grouplabel{font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}select{flex:1;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:.85rem}.count{font-size:.72rem;color:var(--muted);margin-left:auto}.count b{color:var(--text)}.controls{display:flex;align-items:center;gap:8px 14px;flex-wrap:wrap;padding:8px 0 4px}.seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:rgba(18,21,28,.7)}.seg button{border:0;background:transparent;color:var(--muted);font-size:.72rem;padding:7px 13px;cursor:pointer}.seg button[aria-pressed=true]{background:rgba(0,229,255,.16);color:var(--text)}.seg button:disabled{opacity:.4}.viewbtn{border:1px solid rgba(255,255,255,.55);background:rgba(255,255,255,.08);color:#fff;border-radius:999px;padding:6px 12px;cursor:pointer;display:inline-flex;gap:7px}.srctag{margin-left:auto;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:2px 8px}.crumbs{display:flex;gap:6px;padding:2px 0 0;font-size:.66rem;color:var(--muted);min-height:18px}.crumbs a{color:var(--cyan);cursor:pointer;text-decoration:none}.hint{padding:4px 0 8px;font-size:.62rem;color:var(--muted)}.hint b{color:var(--text)}.stage{flex:1;position:relative;overflow:hidden}.overlay{position:absolute;inset:0;overflow:auto;padding:16px var(--safe) max(env(safe-area-inset-bottom),22px)}.shell{width:min(var(--shell),100%);margin:0 auto;display:flex;flex-direction:column;gap:12px}.card{border:1px solid var(--line);border-radius:14px;background:linear-gradient(160deg,rgba(255,255,255,.055),rgba(255,255,255,.014));padding:10px 12px;display:flex;flex-direction:column;gap:6px;min-height:74px;box-shadow:0 16px 44px rgba(0,0,0,.12)}a.cardlink{color:inherit;text-decoration:none}.row{display:flex;align-items:center;gap:7px}.badge{font-size:.55rem;border:1px solid var(--line);border-radius:6px;padding:2px 5px;color:var(--muted)}.name{font-size:.85rem;font-weight:650;line-height:1.15;overflow-wrap:anywhere}.dot{width:9px;height:9px;border-radius:50%;margin-left:auto;box-shadow:0 0 8px currentColor}.reason{font-size:.68rem;color:var(--muted);line-height:1.25}.is-center{border-color:var(--cyan);box-shadow:0 0 0 1px rgba(0,229,255,.22),0 0 26px rgba(0,229,255,.12)}.contents{align-self:flex-start;margin-top:3px;font-size:.62rem;color:var(--cyan);border:1px solid rgba(0,229,255,.4);border-radius:999px;padding:4px 10px;background:rgba(0,229,255,.08);cursor:pointer}.inert{opacity:.34}.sect{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:16px 2px 4px}.branch{position:relative;padding-left:20px;display:flex;flex-direction:column;gap:9px}.twig{position:relative;cursor:pointer}.twig .card{border-left:3px solid var(--twig,var(--line))}.relrow{display:flex;gap:6px;flex-wrap:wrap}.reltag{font-size:.55rem;text-transform:uppercase;padding:1px 7px;border-radius:999px;border:1px solid currentColor}.go{font-size:.6rem;color:var(--cyan);margin-left:auto}</style></head><body><div class="top"><div class="bar"><div class="brand"><span class="ey">Ventus · Global Grid 2050</span><h1>The Spider Sandbox</h1></div><div class="pick"><label for="focus">Focus</label><select id="focus"></select></div><div class="count" id="count"></div></div><div class="controls"><span class="grouplabel">Show</span><div class="seg" id="relSeg"><button data-mode="both" aria-pressed="true">Both</button><button data-mode="out" aria-pressed="false">Outgoing</button><button data-mode="in" aria-pressed="false">Incoming</button></div><button class="viewbtn" id="spiderToggle" aria-pressed="false"><span class="spider-glyph" aria-hidden="true">🕷</span><span id="viewLabel">Spider</span></button><span class="grouplabel">Tap does</span><div class="seg" id="actSeg"><button data-act="explore" aria-pressed="true">Explore</button><button class="gh" data-act="github" aria-pressed="false">GitHub</button><button class="ext" data-act="external" aria-pressed="false">External</button><button data-act="status" aria-pressed="false" disabled>Status</button></div><span class="srctag">snapshot</span></div><div class="crumbs" id="crumbs"></div><div class="hint" id="hint"></div></div><div class="stage"><div class="overlay column" id="overlay"></div></div><script src="federation_radial_po3.js"></script></body></html>
