<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Ventus Spider Local Light Sample</title>
<style>
  :root{
    --bg:#090b10;
    --panel:#1a1d25;
    --line:#6b707b;
    --text:#f7f8ff;
    --muted:#a9b0c2;
    --gold:#ffd54a;
    --gold-hot:#fff8b0;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    min-height:100dvh;
    display:grid;
    place-items:center;
    background:radial-gradient(900px 520px at 50% 25%,rgba(255,213,74,.04),transparent 56%),var(--bg);
    color:var(--text);
    font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  .frame{
    width:min(92vw,760px);
    padding:28px;
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    background:linear-gradient(160deg,rgba(255,255,255,.04),rgba(255,255,255,.012));
    box-shadow:0 24px 90px rgba(0,0,0,.36);
  }
  .ey{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:.68rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:#00e5ff;
  }
  h1{margin:8px 0 26px;font-size:clamp(1.25rem,4vw,2.2rem);line-height:1.05}
  .chip{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:.9rem;
    padding:18px 34px 18px 22px;
    border:2px solid rgba(255,255,255,.58);
    border-radius:999px;
    background:rgba(255,255,255,.045);
    color:#fff;
    box-shadow:none;
    overflow:visible;
    isolation:isolate;
  }
  .spider-wrap{
    position:relative;
    display:inline-grid;
    place-items:center;
    width:2.65rem;
    height:2.65rem;
    flex:0 0 auto;
    isolation:isolate;
  }
  .spider-wrap::before{
    content:"";
    position:absolute;
    inset:-.45rem;
    z-index:0;
    border-radius:50%;
    background:radial-gradient(circle,rgba(255,238,164,.68) 0%,rgba(255,213,74,.34) 24%,rgba(255,191,40,.11) 48%,rgba(255,191,40,0) 72%);
    filter:blur(10px);
    opacity:.78;
    pointer-events:none;
  }
  .spider-wrap::after{
    content:"";
    position:absolute;
    z-index:3;
    left:.18rem;
    top:-.1rem;
    width:.32rem;
    height:2.82rem;
    border-radius:999px;
    background:linear-gradient(180deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.9) 36%,rgba(255,246,188,1) 50%,rgba(255,255,255,.72) 64%,rgba(255,255,255,0) 100%);
    filter:blur(.85px);
    transform:translateX(-.3rem) rotate(28deg);
    opacity:0;
    mix-blend-mode:screen;
    animation:spiderBeam 3.8s ease-in-out infinite;
    pointer-events:none;
  }
  .spider-glyph{
    position:relative;
    z-index:1;
    display:inline-block;
    width:2.15rem;
    height:2.15rem;
    font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
    font-size:0;
    line-height:1;
  }
  .spider-glyph::before,
  .spider-glyph::after{
    content:attr(data-icon);
    position:absolute;
    inset:0;
    display:block;
    font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif;
    font-size:2.15rem;
    line-height:1;
    transform:translateZ(0);
  }
  .spider-glyph::before{
    z-index:1;
    filter:brightness(0) saturate(100%) invert(83%) sepia(74%) saturate(857%) hue-rotate(350deg) brightness(106%) contrast(103%) drop-shadow(0 0 1px rgba(255,255,232,.95)) drop-shadow(0 0 7px rgba(255,213,74,.62)) drop-shadow(0 0 18px rgba(255,213,74,.22)) drop-shadow(0 3px 5px rgba(0,0,0,.7));
  }
  .spider-glyph::after{
    z-index:2;
    opacity:.32;
    filter:sepia(1) saturate(1.6) hue-rotate(1deg) brightness(1.9) contrast(1.1);
    mix-blend-mode:screen;
  }
  .label{font-size:clamp(2.2rem,9vw,4.8rem);line-height:1;color:#fff;letter-spacing:.01em}
  p{margin:24px 0 0;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.78rem;line-height:1.45;max-width:54ch}
  @keyframes spiderBeam{
    0%,68%,100%{opacity:0;transform:translateX(-.3rem) rotate(28deg)}
    12%{opacity:.95}
    24%{opacity:.78;transform:translateX(.24rem) rotate(28deg)}
    36%{opacity:0;transform:translateX(.24rem) rotate(28deg)}
  }
  @media (prefers-reduced-motion:reduce){.spider-wrap::after{animation:none;opacity:.28}}
</style>
</head>
<body>
  <main class="frame">
    <div class="ey">Ventus · Global Grid 2050</div>
    <h1>Ventus Spider local-light sample</h1>
    <div class="chip" aria-label="Spider local-light sample">
      <span class="spider-wrap" aria-hidden="true"><span class="spider-glyph" data-icon="🕷">🕷</span></span>
      <span class="label">Spider</span>
    </div>
    <p>Native spider glyph locked. No custom silhouette. The black body is suppressed by same-glyph gold material layers; only the spider catches the local solar beam.</p>
  </main>
</body>
</html>
