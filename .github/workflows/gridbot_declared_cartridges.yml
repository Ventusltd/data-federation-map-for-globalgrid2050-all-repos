name: GridBot Declared Cartridges

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'audit writes reports only; apply writes declared cartridges after human approval'
        type: choice
        required: true
        default: audit
        options:
          - audit
          - apply
      commit_reports:
        description: 'Commit audit report evidence when mode=audit'
        type: choice
        required: true
        default: 'false'
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: gridbot-declared-cartridges
  cancel-in-progress: false

env:
  RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'audit' }}
  COMMIT_REPORTS: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_reports || 'false' }}

jobs:
  declared-cartridges:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'apply' && 'federation-apply' || 'federation-audit' }}

    steps:
      - name: Checkout federation map repo using GridBot PAT
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GRIDBOT_PAT }}

      - name: Enforce mode and apply gate
        run: |
          set -euo pipefail
          echo "RUN_MODE=${RUN_MODE}"
          echo "COMMIT_REPORTS=${COMMIT_REPORTS}"
          if [ "${RUN_MODE}" != "audit" ] && [ "${RUN_MODE}" != "apply" ]; then
            echo "Invalid mode: ${RUN_MODE}"
            exit 1
          fi
          if [ "${RUN_MODE}" = "apply" ] && [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            echo "Apply is only allowed from a human workflow_dispatch."
            exit 1
          fi

      - name: Sync latest branch before processing
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install duckdb

      - name: Build declared cartridges report
        run: |
          set -euo pipefail
          python scripts/build_declared_cartridges.py \
            --mode "${RUN_MODE}" \
            --repository "${GITHUB_REPOSITORY}"

      - name: Upload declared cartridge report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: federation-declared-cartridges-report
          if-no-files-found: warn
          path: |
            reports/FEDERATION_CARTRIDGES_LATEST.md
            reports/json/FEDERATION_CARTRIDGES_LATEST.json
            data/federation_map/cartridges/provenance=declared

      - name: Commit declared cartridge audit evidence
        if: ${{ success() && env.RUN_MODE == 'audit' && env.COMMIT_REPORTS == 'true' }}
        env:
          GH_WRITE_TOKEN: ${{ secrets.GRIDBOT_PAT }}
        run: |
          set -euo pipefail
          git config user.name "Gridbot"
          git config user.email "gridbot@users.noreply.github.com"
          git add \
            scripts/build_declared_cartridges.py \
            .github/workflows/gridbot_declared_cartridges.yml \
            every-drop-is-the-ocean/AUDITOR_VERIFICATION_CONTRACT.md \
            reports/FEDERATION_CARTRIDGES_LATEST.md \
            reports/json/FEDERATION_CARTRIDGES_LATEST.json
          if git diff --cached --name-only | grep -E '^(data/federation_map/cartridges/|data/federation_map/current/|dashboard/|live_sandbox/|homepage/)'; then
            echo "Audit commit attempted to stage target cartridges, base current store, or UI files."
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No declared cartridge audit evidence changes to commit."
          else
            git commit -m "data: declared-cartridges audit"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Commit declared cartridge apply output
        if: ${{ success() && env.RUN_MODE == 'apply' }}
        env:
          GH_WRITE_TOKEN: ${{ secrets.GRIDBOT_PAT }}
        run: |
          set -euo pipefail
          git config user.name "Gridbot"
          git config user.email "gridbot@users.noreply.github.com"
          git add \
            data/federation_map/cartridges/provenance=declared \
            reports/FEDERATION_CARTRIDGES_LATEST.md \
            reports/json/FEDERATION_CARTRIDGES_LATEST.json
          if git diff --cached --name-only | grep -E '^(data/federation_map/current/|dashboard/|live_sandbox/|homepage/)'; then
            echo "Apply commit attempted to stage base current store or UI files."
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No declared cartridge apply changes to commit."
          else
            git commit -m "data: declared-cartridges apply"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
