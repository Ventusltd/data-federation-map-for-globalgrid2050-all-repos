name: GridBot Federation Publish Weekly

on:
  schedule:
    - cron: '31 6 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'audit builds the plan and writes reports only; apply publishes verified Parquet and JSON after human dispatch'
        type: choice
        required: true
        default: audit
        options:
          - audit
          - apply
      commit_reports:
        description: 'Commit audit report and ledger evidence when mode=audit'
        type: choice
        required: true
        default: 'false'
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

concurrency:
  group: gridbot-federation-publish-weekly
  cancel-in-progress: false

env:
  RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'audit' }}
  COMMIT_REPORTS: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_reports || 'false' }}

jobs:
  federation-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'apply' && 'federation-apply' || 'federation-audit' }}

    steps:
      - name: Checkout federation map repo using GridBot PAT
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GRIDBOT_PAT }}

      - name: Check GridBot PAT is available
        env:
          GRIDBOT_PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${GRIDBOT_PAT}" ]; then
            echo "GRIDBOT_PAT is missing or unavailable to this workflow."
            exit 1
          fi
          echo "GRIDBOT_PAT is available to this workflow."

      - name: Enforce mode and apply gate
        run: |
          set -euo pipefail
          echo "RUN_MODE=${RUN_MODE}"
          echo "COMMIT_REPORTS=${COMMIT_REPORTS}"
          if [ "${RUN_MODE}" != "audit" ] && [ "${RUN_MODE}" != "apply" ]; then
            echo "Invalid mode: ${RUN_MODE}"
            exit 1
          fi
          if [ "${RUN_MODE}" = "apply" ] && [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            echo "Apply is only allowed from a human workflow_dispatch."
            exit 1
          fi
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ] && [ "${RUN_MODE}" != "audit" ]; then
            echo "Scheduled/default runs must remain audit only."
            exit 1
          fi

      - name: Sync latest main before processing
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install duckdb requests

      - name: Run scanner
        id: scanner
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GRIDBOT_PAT }}
          GRIDBOT_PAT: ${{ secrets.GRIDBOT_PAT }}
        run: |
          set -euo pipefail
          python scripts/build_federation_map.py --owner Ventusltd

      - name: Run federation publish bridge
        env:
          GRIDBOT_PAT: ${{ secrets.GRIDBOT_PAT }}
          GH_TOKEN: ${{ secrets.GRIDBOT_PAT }}
        run: |
          set -euo pipefail
          python scripts/publish_federation_json.py \
            --mode "${RUN_MODE}" \
            --repository "${GITHUB_REPOSITORY}" \
            --scanner-status "${{ steps.scanner.outcome }}"

      - name: Upload federation publish report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: federation-publish-report
          if-no-files-found: warn
          path: |
            reports/FEDERATION_MAP_LATEST.md
            reports/json/FEDERATION_MAP_LATEST.json
            reports/FEDERATION_PUBLISH_LATEST.md
            reports/json/FEDERATION_PUBLISH_LATEST.json
            live_sandbox/federation_control_ledger/PUBLISH_LEDGER.md
            data/federation_map/current/nodes.parquet
            data/federation_map/current/edges.parquet

      - name: Commit federation publish audit evidence
        if: ${{ success() && env.RUN_MODE == 'audit' && env.COMMIT_REPORTS == 'true' }}
        env:
          GH_WRITE_TOKEN: ${{ secrets.GRIDBOT_PAT }}
        run: |
          set -euo pipefail
          git config user.name "Gridbot"
          git config user.email "gridbot@users.noreply.github.com"
          git add \
            scripts/build_federation_map.py \
            scripts/publish_federation_json.py \
            .github/workflows/gridbot_federation_map_weekly.yml \
            every-drop-is-the-ocean/AUDITOR_VERIFICATION_CONTRACT.md \
            reports/FEDERATION_MAP_LATEST.md \
            reports/json/FEDERATION_MAP_LATEST.json \
            reports/FEDERATION_PUBLISH_LATEST.md \
            reports/json/FEDERATION_PUBLISH_LATEST.json \
            live_sandbox/federation_control_ledger/PUBLISH_LEDGER.md
          if git diff --cached --name-only | grep -E '^(live_sandbox/federation_control_ledger/data/(nodes|edges)\.json|data/federation_map/current/(nodes|edges)\.parquet|data/federation_map/snapshots/)'; then
            echo "Audit commit attempted to stage target JSON or Parquet."
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No federation publish audit evidence changes to commit."
          else
            git commit -m "data: provenance-discriminator audit"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Commit federation publish apply output
        if: ${{ success() && env.RUN_MODE == 'apply' }}
        env:
          GH_WRITE_TOKEN: ${{ secrets.GRIDBOT_PAT }}
        run: |
          set -euo pipefail
          git config user.name "Gridbot"
          git config user.email "gridbot@users.noreply.github.com"
          git add \
            data/federation_map/current/nodes.parquet \
            data/federation_map/current/edges.parquet \
            data/federation_map/snapshots \
            reports/FEDERATION_MAP_LATEST.md \
            reports/json/FEDERATION_MAP_LATEST.json \
            live_sandbox/federation_control_ledger/data/nodes.json \
            live_sandbox/federation_control_ledger/data/edges.json \
            live_sandbox/federation_control_ledger/PUBLISH_LEDGER.md \
            reports/FEDERATION_PUBLISH_LATEST.md \
            reports/json/FEDERATION_PUBLISH_LATEST.json \
            DEPENDENCIES.md
          if git diff --cached --quiet; then
            echo "No federation publish apply changes to commit."
          else
            git commit -m "data: provenance-discriminator apply"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
